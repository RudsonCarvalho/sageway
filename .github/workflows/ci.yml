name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Gate 1: Build ─────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          protoc --version

      - name: Generate protobuf
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          make proto

      - name: Build all binaries
        run: go build ./...

  # ── Gate 2: Test with race detector ───────────────────────────────────────
  test:
    name: Test (race detector)
    runs-on: ubuntu-latest
    services:
      etcd:
        image: bitnami/etcd:3
        env:
          ALLOW_NONE_AUTHENTICATION: "yes"
        ports:
          - 2379:2379
      elasticsearch:
        image: elasticsearch:8.12.0
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
        ports:
          - 9200:9200
      opa:
        image: openpolicyagent/opa:0.63.0
        ports:
          - 8181:8181
        options: >-
          --entrypoint /opa
        env:
          OPA_ARGS: run --server --addr :8181

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run tests with race detector
        run: go test ./... -race -count=1 -coverprofile=coverage.out -timeout 5m
        env:
          ETCD_ENDPOINTS: http://localhost:2379
          ELASTICSEARCH_URL: http://localhost:9200
          OPA_URL: http://localhost:8181
          AASG_ENV: ci

      - name: Check coverage thresholds
        run: |
          go tool cover -func=coverage.out > coverage_report.txt
          cat coverage_report.txt

          # Security-critical packages must have >= 90% coverage
          check_coverage() {
            PKG=$1
            THRESHOLD=$2
            COV=$(grep "$PKG" coverage_report.txt | awk '{print $3}' | tr -d '%' | tail -1)
            if [ -z "$COV" ]; then
              echo "⚠️  Package $PKG not found in coverage report"
              return 0
            fi
            if (( $(echo "$COV < $THRESHOLD" | bc -l) )); then
              echo "❌ $PKG: ${COV}% < ${THRESHOLD}% required"
              exit 1
            else
              echo "✅ $PKG: ${COV}%"
            fi
          }

          check_coverage "internal/crypto"  90
          check_coverage "internal/l2/fsm"  90
          check_coverage "internal/audit"   90
          check_coverage "internal/api"     80

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_report.txt

  # ── Gate 3: Lint ──────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: v1.57
          args: --timeout 5m

  # ── Gate 4: Security scan ─────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: '-severity medium -confidence medium ./...'

      - name: Check for known vulnerabilities
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # ── Gate 5: Benchmarks (SLA validation) ───────────────────────────────────
  bench:
    name: Benchmarks (SLA)
    runs-on: ubuntu-latest
    # Only run on PRs — skip on main push to save CI minutes
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run benchmarks
        run: |
          go test ./... -bench=. -benchmem -benchtime=5s -run='^$' \
            | tee bench_results.txt

      - name: Validate SLA targets
        run: |
          # HMAC sign+verify must be < 1ms (1,000,000 ns)
          HMAC_NS=$(grep "BenchmarkHMAC" bench_results.txt | awk '{print $3}' | tr -d 'ns/op' | head -1)
          if [ -n "$HMAC_NS" ] && [ "$HMAC_NS" -gt 1000000 ]; then
            echo "❌ HMAC too slow: ${HMAC_NS}ns > 1ms target"
            exit 1
          fi
          echo "✅ Benchmark SLAs met"

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench_results.txt

  # ── Gate 6: Dependency audit ──────────────────────────────────────────────
  deps:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Verify go.sum is up to date
        run: |
          go mod tidy
          git diff --exit-code go.sum go.mod

      - name: Check for unexpected new dependencies
        run: |
          # List all direct dependencies
          go list -m -f '{{if not .Indirect}}{{.Path}}{{end}}' all \
            | sort > current_deps.txt
          echo "Direct dependencies:"
          cat current_deps.txt

          # Fail if any dep not in the approved list
          APPROVED_DEPS=(
            "google.golang.org/grpc"
            "google.golang.org/protobuf"
            "github.com/rs/zerolog"
            "github.com/prometheus/client_golang"
            "github.com/open-policy-agent/opa"
            "github.com/spiffe/go-spiffe/v2"
            "go.etcd.io/etcd/client/v3"
            "github.com/elastic/go-elasticsearch/v8"
            "github.com/testcontainers/testcontainers-go"
            "golang.org/x/crypto"
            "github.com/stretchr/testify"
            "go.uber.org/goleak"
          )

          while IFS= read -r dep; do
            FOUND=false
            for approved in "${APPROVED_DEPS[@]}"; do
              if [[ "$dep" == "$approved"* ]]; then
                FOUND=true
                break
              fi
            done
            if [ "$FOUND" = false ]; then
              echo "❌ Unexpected dependency: $dep"
              echo "   Add to APPROVED_DEPS in CI or justify in PR description"
              exit 1
            fi
          done < current_deps.txt

          echo "✅ All dependencies approved"

  # ── Summary: all gates must pass ─────────────────────────────────────────
  ci-complete:
    name: CI Complete
    needs: [build, test, lint, security, deps]
    runs-on: ubuntu-latest
    steps:
      - name: All gates passed
        run: echo "✅ All CI gates passed — safe to merge"
